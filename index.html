<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>JOD MODS OTT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { 
            background: #0a0a0a; 
            color: #fff; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #ff3b3b; border-radius: 10px; }

        /* ===== ANIMATED PARTICLES BACKGROUND ===== */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            background: rgba(255,59,59,0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* ===== GLOW TEXT ===== */
        .glow-text {
            animation: glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 10px rgba(255,59,59,0.3), 0 0 20px rgba(255,59,59,0.1); }
            50% { text-shadow: 0 0 25px rgba(255,59,59,0.6), 0 0 50px rgba(255,59,59,0.3); }
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(26,26,26,0.95);
            border-bottom: 3px solid #ff3b3b;
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            animation: slideDown 0.6s ease;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo { 
            font-size: 22px; 
            font-weight: 800; 
            animation: glowPulse 3s ease-in-out infinite;
        }
        .logo span { color: #ff3b3b; }
        .logo i { color: #ff3b3b; margin-right: 5px; }

        .nav-links {
            display: flex;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #ccc;
            text-decoration: none;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
            transition: 0.3s;
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: #ff3b3b;
            transition: 0.3s;
            transform: translateX(-50%);
        }
        .nav-links a:hover::after, .nav-links a.active::after {
            width: 60%;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #fff;
            background: rgba(255,59,59,0.2);
            transform: scale(1.05);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #222;
            padding: 5px 12px;
            border-radius: 30px;
            flex: 1;
            max-width: 280px;
            min-width: 140px;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .search-box:focus-within {
            border-color: #ff3b3b;
            box-shadow: 0 0 30px rgba(255,59,59,0.15);
        }
        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            padding: 5px 8px;
            width: 100%;
            font-size: 13px;
        }
        .search-box input::placeholder { color: #888; }
        .search-box i { color: #888; cursor: pointer; transition: 0.3s; }
        .search-box i:hover { color: #ff3b3b; transform: scale(1.2); }

        .auth-buttons {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .auth-btn {
            background: transparent;
            color: #ccc;
            border: 1px solid #444;
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .auth-btn:hover {
            background: #ff3b3b;
            border-color: #ff3b3b;
            color: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,59,59,0.3);
        }
        .auth-btn.login-btn {
            background: #ff3b3b;
            border-color: #ff3b3b;
            color: #fff;
        }
        .auth-btn.login-btn:hover {
            background: #cc2e2e;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 20px;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .user-profile:hover {
            border-color: #ff3b3b;
            background: rgba(255,59,59,0.1);
        }
        .user-profile .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3b3b, #cc2e2e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            animation: avatarGlow 2s ease-in-out infinite;
        }
        @keyframes avatarGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(255,59,59,0.3); }
            50% { box-shadow: 0 0 25px rgba(255,59,59,0.6); }
        }
        .user-profile .username {
            font-size: 13px;
            color: #ccc;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .hero {
            background: rgba(26,26,26,0.6);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #333;
            backdrop-filter: blur(5px);
            animation: fadeInUp 0.8s ease;
        }
        @keyframes fadeInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .hero h1 { 
            font-size: 28px; 
            font-weight: 800; 
        }
        .hero h1 span { color: #ff3b3b; }
        .hero p { font-size: 14px; color: #aaa; margin-top: 5px; }
        .hero .tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .hero .tags span {
            background: rgba(34,34,34,0.8);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            color: #ff3b3b;
            border: 1px solid #333;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .hero .tags span:hover {
            transform: scale(1.1);
            border-color: #ff3b3b;
        }

        .loader { text-align: center; padding: 50px; font-size: 18px; color: #ff3b3b; }
        .loader i { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .section { padding: 18px 20px; animation: fadeInUp 0.6s ease; }
        .section h2 {
            font-size: 20px;
            margin-bottom: 14px;
            border-left: 5px solid #ff3b3b;
            padding-left: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section h2 i { color: #ff3b3b; }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 18px;
        }
        .content-card {
            background: #151515;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid #252525;
            position: relative;
        }
        .content-card:hover {
            transform: scale(1.05) translateY(-8px);
            border-color: #ff3b3b;
            box-shadow: 0 0 40px rgba(255,59,59,0.25);
        }
        .content-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #1a1a1a;
            transition: 0.5s;
        }
        .content-card:hover img {
            transform: scale(1.05);
        }
        .content-card .info { padding: 8px 10px; }
        .content-card .info h4 { font-size: 13px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .content-card .info p { font-size: 10px; color: #888; }
        .content-card .badge {
            background: #ff3b3b;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 600;
            display: inline-block;
            margin-top: 3px;
        }
        .free-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #00c853;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 600;
            color: #fff;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .admin-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #ff3b3b;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 600;
            color: #fff;
        }
        .watched-badge {
            position: absolute;
            bottom: 45px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 9px;
            color: #00c853;
            backdrop-filter: blur(5px);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 12px;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: #141414;
            padding: 16px;
            border-radius: 16px;
            width: 95%;
            max-width: 920px;
            max-height: 92vh;
            overflow-y: auto;
            border: 1px solid #ff3b3b;
            position: relative;
            animation: modalIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalIn {
            from { transform: scale(0.8) rotate(-5deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .modal-content::-webkit-scrollbar { width: 5px; }
        .modal-content::-webkit-scrollbar-thumb { background: #ff3b3b; border-radius: 10px; }

        .close-modal {
            position: sticky;
            top: 0;
            float: right;
            font-size: 24px;
            color: #fff;
            cursor: pointer;
            background: #ff3b3b;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 10;
            border: none;
            transition: 0.3s;
        }
        .close-modal:hover { background: #cc2e2e; transform: rotate(90deg) scale(1.1); }
        .modal-title { color: #fff; font-size: 20px; margin: 6px 0 4px 0; }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .custom-video-player {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
        }
        .custom-video-player video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .action-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .action-bar button {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 7px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .action-bar button:hover {
            background: #ff3b3b;
            border-color: #ff3b3b;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,59,59,0.3);
        }
        .action-bar button i { color: #ff3b3b; }
        .action-bar button:hover i { color: #fff; }

        .episode-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            max-height: 350px;
            overflow-y: auto;
            padding: 5px;
        }
        .episode-grid::-webkit-scrollbar { width: 4px; }
        .episode-grid::-webkit-scrollbar-thumb { background: #ff3b3b; border-radius: 10px; }

        .episode-btn {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 5px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 11px;
            min-width: 85px;
        }
        .episode-btn:hover {
            background: #ff3b3b;
            border-color: #ff3b3b;
            transform: scale(1.05);
        }
        .episode-btn.active {
            background: #ff3b3b;
            border-color: #ff3b3b;
            box-shadow: 0 0 20px rgba(255,59,59,0.3);
        }
        .episode-btn i { margin-right: 4px; }
        .episode-btn.watched-ep {
            border-color: #00c853;
            color: #00c853;
        }

        .footer {
            text-align: center;
            padding: 18px;
            color: #555;
            border-top: 1px solid #1f1f1f;
            margin-top: 10px;
            font-size: 12px;
        }

        .no-results {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .no-results i { font-size: 36px; color: #ff3b3b; margin-bottom: 8px; }

        .player-status {
            color: #00c853;
            font-size: 12px;
            padding: 8px;
            text-align: center;
            background: #1a1a1a;
            border-radius: 8px;
            margin: 8px 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 60px;
            color: #ff3b3b;
            margin-bottom: 16px;
            animation: pulse 2s infinite;
        }
        .empty-state h3 {
            font-size: 22px;
            color: #fff;
            margin-bottom: 8px;
        }
        .empty-state p {
            color: #888;
            font-size: 14px;
        }

        .upload-btn {
            background: #00c853;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: 0.3s;
        }
        .upload-btn:hover {
            background: #009624;
            transform: scale(1.05);
        }

        .upload-btn.admin-only {
            background: #ff3b3b;
        }
        .upload-btn.admin-only:hover {
            background: #cc2e2e;
        }

        /* ===== AUTH OVERLAY ===== */
        .auth-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
            animation: fadeIn 0.3s ease;
        }
        .auth-overlay.active {
            display: flex;
        }
        .auth-box {
            background: rgba(26,26,26,0.95);
            padding: 35px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #ff3b3b;
            animation: modalIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 0 0 60px rgba(255,59,59,0.1);
        }
        .auth-box .close-auth {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            color: #888;
            cursor: pointer;
            background: none;
            border: none;
            transition: 0.3s;
        }
        .auth-box .close-auth:hover {
            color: #ff3b3b;
            transform: rotate(90deg);
        }
        .auth-box h2 {
            color: #ff3b3b;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .auth-box input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }
        .auth-box input:focus {
            border-color: #ff3b3b;
            box-shadow: 0 0 30px rgba(255,59,59,0.1);
            outline: none;
        }
        .auth-box input::placeholder { color: #666; }
        .auth-box button {
            width: 100%;
            padding: 12px;
            background: #ff3b3b;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .auth-box button:hover {
            background: #cc2e2e;
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255,59,59,0.3);
        }
        .auth-box .switch-auth {
            text-align: center;
            margin-top: 12px;
            color: #888;
            font-size: 13px;
        }
        .auth-box .switch-auth span {
            color: #ff3b3b;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .auth-box .switch-auth span:hover {
            text-decoration: underline;
        }
        .auth-box .error-msg {
            color: #ff3b3b;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
        }
        .auth-box .success-msg {
            color: #00c853;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
        }

        /* ===== COMMENTS ===== */
        .comments-section {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: rgba(26,26,26,0.8);
            border-radius: 12px;
            border: 1px solid #333;
            backdrop-filter: blur(5px);
            animation: fadeInUp 0.6s ease;
        }
        .comments-section h3 {
            color: #ff3b3b;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .comments-section h3 i { margin-right: 8px; }
        .comment-input-area {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .comment-input-area input {
            flex: 1;
            min-width: 150px;
            padding: 10px 14px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            font-size: 13px;
            transition: 0.3s;
        }
        .comment-input-area input:focus {
            border-color: #ff3b3b;
            outline: none;
        }
        .comment-input-area input::placeholder { color: #666; }
        .comment-input-area button {
            background: #ff3b3b;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .comment-input-area button:hover {
            background: #cc2e2e;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,59,59,0.3);
        }

        .comment-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .comment-list::-webkit-scrollbar { width: 4px; }
        .comment-list::-webkit-scrollbar-thumb { background: #ff3b3b; border-radius: 10px; }

        .comment-item {
            background: #151515;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid #ff3b3b;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 8px;
            transition: 0.3s;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .comment-item:hover {
            background: #1a1a1a;
            border-color: #ff6b6b;
        }
        .comment-item .comment-text {
            flex: 1;
            min-width: 150px;
        }
        .comment-item .comment-text .comment-user {
            color: #ff3b3b;
            font-weight: 600;
            font-size: 13px;
        }
        .comment-item .comment-text .comment-msg {
            color: #ccc;
            font-size: 14px;
            margin-top: 2px;
            word-break: break-word;
        }
        .comment-item .comment-text .comment-time {
            color: #666;
            font-size: 10px;
            margin-top: 4px;
        }
        .comment-item .comment-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .comment-item .comment-actions button {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            transition: 0.3s;
        }
        .comment-item .comment-actions .edit-cmt:hover {
            color: #ffa500;
            background: #222;
        }
        .comment-item .comment-actions .del-cmt:hover {
            color: #ff3b3b;
            background: #222;
        }
        .comment-item .comment-actions .save-cmt { color: #00c853; }
        .comment-item .comment-actions .save-cmt:hover { background: #222; }
        .comment-item .comment-actions .cancel-cmt { color: #ff3b3b; }
